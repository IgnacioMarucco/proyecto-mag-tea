<div
  aria-live="polite"
  aria-atomic="false"
  class="fixed bottom-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none"
>
  @for (t of toast.toasts(); track t.id) {
    <div
      role="status"
      class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium"
      [class]="t.type === 'success'
        ? 'bg-success text-white'
        : 'bg-danger text-white'"
    >
      @if (t.type === 'success') {
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      } @else {
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      }
      <span>{{ t.message }}</span>
      <button
        type="button"
        (click)="toast.dismiss(t.id)"
        class="ml-2 opacity-70 hover:opacity-100 transition-opacity"
        aria-label="Cerrar"
      >
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
