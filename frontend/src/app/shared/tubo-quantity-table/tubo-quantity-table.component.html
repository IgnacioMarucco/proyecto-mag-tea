@if (tubos().length > 0) {
  <div class="mt-3 border border-border rounded-md overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-background border-b border-border">
        <tr>
          <th class="px-4 py-2.5 text-left text-xs font-mono text-text-muted uppercase tracking-wider w-24">Posición</th>
          <th class="px-4 py-2.5 text-left text-xs font-mono text-text-muted uppercase tracking-wider">Cantidad (ml)</th>
        </tr>
      </thead>
      <tbody>
        @for (tubo of tubos(); track tubo.posicion) {
          <tr class="border-b border-border last:border-0">
            <td class="px-4 py-2.5 font-mono text-text font-medium">{{ tubo.posicion }}</td>
            <td class="px-4 py-2.5">
              <input
                type="number"
                step="0.01"
                min="0.01"
                [value]="tubo.cantidadInicial || ''"
                placeholder="0.00"
                (input)="update(tubo.posicion, $any($event.target).value)"
                class="w-32 px-2.5 py-1.5 text-sm bg-surface border border-border rounded-md text-text font-mono
                       focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              />
            </td>
          </tr>
        }
      </tbody>
      <tfoot class="bg-background border-t border-border">
        <tr>
          <td class="px-4 py-2.5 text-xs font-mono text-text-muted">Total</td>
          <td class="px-4 py-2.5 font-mono text-text font-medium">{{ total().toFixed(2) }} ml</td>
        </tr>
      </tfoot>
    </table>
  </div>
}
