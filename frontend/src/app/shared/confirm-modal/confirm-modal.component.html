<!-- Backdrop -->
<div
  class="fixed inset-0 bg-sidebar/50 flex items-center justify-center z-50 p-5"
  (click)="cancelled.emit()"
>
  <!-- Panel -->
  <div
    class="bg-surface border border-border rounded-lg w-full max-w-sm shadow-md"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-start justify-between px-6 pt-5 pb-4 border-b border-border">
      <h3 class="text-base font-semibold text-text">{{ title() }}</h3>
      <button
        (click)="cancelled.emit()"
        aria-label="Cerrar"
        class="text-text-muted hover:text-text transition-colors text-xl leading-none cursor-pointer ml-4"
      >×</button>
    </div>

    <!-- Body -->
    @if (message()) {
      <p class="px-6 py-4 text-sm text-text-muted">{{ message() }}</p>
    }

    <!-- Acciones -->
    <div class="flex items-center justify-end gap-3 px-6 pb-5" [class.pt-4]="!message()">
      <button
        type="button"
        (click)="cancelled.emit()"
        class="px-4 py-2 text-sm font-medium text-text-muted hover:text-text transition-colors cursor-pointer"
      >{{ cancelLabel() }}</button>
      <button
        type="button"
        (click)="confirmed.emit()"
        class="px-5 py-2 text-sm font-medium text-white rounded-md hover:opacity-90 transition-opacity cursor-pointer"
        [class.bg-danger]="danger()"
        [class.bg-primary]="!danger()"
      >{{ confirmLabel() }}</button>
    </div>
  </div>
</div>
