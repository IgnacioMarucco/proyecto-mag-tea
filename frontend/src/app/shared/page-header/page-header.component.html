<div class="flex items-center gap-1.5 text-xs font-mono tracking-widest uppercase mb-1">
  @for (crumb of crumbs().slice(0, -1); track crumb.label; let last = $last) {
    @if (crumb.path) {
      <a [routerLink]="crumb.path" class="text-text-muted underline underline-offset-2 decoration-text-muted hover:text-primary hover:decoration-primary transition-colors cursor-pointer">{{ crumb.label }}</a>
    } @else {
      <span class="text-text-muted">{{ crumb.label }}</span>
    }
    @if (!last) {
      <span class="text-text-muted">›</span>
    }
  }
</div>
<div class="flex items-center gap-3 flex-wrap">
  <h1 class="text-2xl font-semibold text-text">{{ crumbs()[crumbs().length - 1]?.label }}</h1>
  <ng-content />
</div>
