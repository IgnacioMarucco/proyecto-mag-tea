@if (loading()) {
  <div role="status" class="bg-surface border border-border rounded-lg py-16 flex flex-col items-center gap-3">
    <svg class="animate-spin w-7 h-7 text-primary" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
      <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V2a10 10 0 00-10 10h2z"/>
    </svg>
    <span class="text-xs text-text-muted tracking-wide">Cargando…</span>
  </div>
} @else if (rows() === 0) {
  <div class="bg-surface border border-border rounded-lg py-16 text-center">
    <p class="text-sm font-medium text-text mb-1">{{ emptyTitle() }}</p>
    @if (emptySubtitle()) {
      <p class="text-xs text-text-muted">{{ emptySubtitle() }}</p>
    }
  </div>
} @else {
  <div class="bg-surface border border-border rounded-lg overflow-hidden">
    <table class="w-full text-sm" [attr.aria-label]="ariaLabel()">
      <thead>
        <tr class="border-b border-border bg-background">
          @for (col of columns(); track $index) {
            <th scope="col" [class]="thClass(col)">
              @if (col.sortKey) {
                @let dir = activeSortDir(col);
                <button type="button"
                  class="flex items-center gap-1.5 cursor-pointer select-none hover:text-text transition-colors focus-visible:outline-2 focus-visible:outline-primary focus-visible:rounded-sm w-full"
                  (click)="onHeaderClick(col)"
                  [attr.aria-sort]="getAriaSort(col)">
                  {{ col.label }}
                  @if (dir === 'asc') {
                    <app-icon name="chevron-up" class="w-3 h-3 flex-shrink-0" />
                  } @else if (dir === 'desc') {
                    <app-icon name="chevron-down" class="w-3 h-3 flex-shrink-0" />
                  } @else {
                    <app-icon name="arrows-up-down" class="w-3 h-3 flex-shrink-0 opacity-40" />
                  }
                </button>
              } @else {
                {{ col.label }}
              }
            </th>
          }
          <th scope="col" class="px-5 py-3 text-xs font-mono text-text-muted tracking-wider uppercase text-right">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <ng-content />
      </tbody>
    </table>
  </div>
}
