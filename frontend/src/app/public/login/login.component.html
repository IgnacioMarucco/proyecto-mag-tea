<main class="login-container">
  <section class="login-card" aria-labelledby="login-title">
    <h1 id="login-title">MAG-TEA</h1>
    <p>Iniciá sesión para continuar</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          aria-describedby="email-error"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span id="email-error" role="alert" class="error-text">Email inválido</span>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          aria-describedby="password-error"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span id="password-error" role="alert" class="error-text">La contraseña es obligatoria</span>
        }
      </div>

      @if (error()) {
        <div role="alert" class="error-banner">{{ error() }}</div>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </section>
</main>
