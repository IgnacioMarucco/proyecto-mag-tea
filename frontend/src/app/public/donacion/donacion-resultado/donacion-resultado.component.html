<div class="min-h-screen bg-background flex items-center justify-center px-4">
  <div class="max-w-md w-full">

    <div class="bg-surface border border-border rounded-lg p-8 text-center">

      <!-- Ícono de estado -->
      <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5"
           [class]="config().iconBg">
        @if (status() === 'approved') {
          <svg class="w-7 h-7" [class]="config().iconColor" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        } @else if (status() === 'pending') {
          <svg class="w-7 h-7" [class]="config().iconColor" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        } @else {
          <svg class="w-7 h-7" [class]="config().iconColor" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        }
      </div>

      <!-- Texto -->
      <h1 class="text-xl font-semibold text-text mb-2">{{ config().title }}</h1>
      <p class="text-sm text-text-muted leading-relaxed">{{ config().message }}</p>

      <!-- Volver -->
      <a routerLink="/"
         class="inline-flex items-center justify-center mt-7 px-6 py-2.5 bg-primary text-white text-sm font-medium rounded-md hover:bg-primary-dark transition-colors">
        Volver al inicio
      </a>

    </div>

    <!-- Branding -->
    <p class="text-xs text-text-muted text-center mt-5 font-mono uppercase tracking-widest">
      MAG-TEA · Centro Wernicke · CIQUIBIC
    </p>

  </div>
</div>
