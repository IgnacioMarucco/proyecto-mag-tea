@let p = paciente();

<section class="bg-surface border border-border rounded-lg">
  <div class="flex items-center justify-between px-6 py-4 border-b border-border">
    <div class="flex items-center gap-3">
      <h2 class="text-sm font-semibold text-text">Segunda visita — Extracción de sangre</h2>
      @if (p.fechaExtraccion) {
        <span class="text-xs text-text-muted">·</span>
        <span class="text-xs text-text-muted">Fecha de extracción:
          <span class="text-sm font-semibold text-text">{{ formatDate(p.fechaExtraccion) }}</span>
        </span>
      } @else {
        <span class="text-xs text-text-muted">Sin registrar</span>
      }
    </div>
    <button type="button" (click)="openModal()"
      class="text-xs px-3 py-1.5 bg-primary text-white rounded-md hover:bg-primary-dark transition-colors cursor-pointer shrink-0">
      @if (p.fechaExtraccion) { Editar fecha } @else { Registrar extracción }
    </button>
  </div>
</section>

@if (showModal()) {
<div class="fixed inset-0 bg-sidebar/50 flex items-center justify-center z-50 p-5"
     (click)="showModal.set(false)">
  <div class="bg-surface border border-border rounded-lg w-full max-w-sm shadow-md"
       (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-border">
      <h3 class="text-base font-semibold text-text">Segunda visita — Extracción</h3>
      <button (click)="showModal.set(false)" aria-label="Cerrar"
        class="text-text-muted hover:text-text cursor-pointer">
        <app-icon name="x-mark" class="w-5 h-5" />
      </button>
    </div>
    <form [formGroup]="form" (ngSubmit)="save()" class="px-6 py-5 space-y-4">
      <div>
        <label for="fechaExtraccion" class="block text-xs font-mono text-text-muted uppercase tracking-wider mb-1.5">
          Fecha de extracción
        </label>
        <input id="fechaExtraccion" type="date" formControlName="fechaExtraccion"
          class="w-full px-3 py-2 text-sm bg-surface border border-border rounded-md text-text
                 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" />
      </div>
      @if (saveError()) {
        <p class="text-xs text-danger" role="alert">{{ saveError() }}</p>
      }
      <div class="flex justify-end gap-3 pt-4 border-t border-border">
        <button type="button" (click)="showModal.set(false)"
          class="px-4 py-2 text-sm text-text-muted hover:text-text transition-colors cursor-pointer">Cancelar</button>
        <button type="submit" [disabled]="saving()"
          class="px-5 py-2 text-sm font-medium bg-primary text-white rounded-md hover:bg-primary-dark disabled:opacity-50 cursor-pointer">
          {{ saving() ? 'Guardando…' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
