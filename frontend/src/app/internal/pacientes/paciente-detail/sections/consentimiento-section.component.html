@let p = paciente();

<section class="bg-surface border border-border rounded-lg">
  <div class="flex items-center justify-between px-6 py-4 border-b border-border">
    <div class="flex items-center gap-3">
      <h2 class="text-sm font-semibold text-text">Consentimiento informado</h2>
      @if (p.consentimientoFirmado) {
        <span class="inline-flex items-center gap-1 text-xs text-accent">
          <app-icon name="check" class="w-3.5 h-3.5" /> Firmado
        </span>
      } @else {
        <span class="text-xs text-text-muted">Pendiente de registro</span>
      }
    </div>
    <button type="button" (click)="openModal()"
      class="text-xs px-3 py-1.5 bg-primary text-white rounded-md hover:bg-primary-dark transition-colors cursor-pointer">
      @if (p.consentimientoFirmado) { Editar } @else { Registrar }
    </button>
  </div>
</section>

@if (showModal()) {
<div class="fixed inset-0 bg-sidebar/50 flex items-center justify-center z-50 p-5"
     (click)="showModal.set(false)">
  <div class="bg-surface border border-border rounded-lg w-full max-w-sm shadow-md"
       (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-border">
      <h3 class="text-base font-semibold text-text">Consentimiento informado</h3>
      <button (click)="showModal.set(false)" aria-label="Cerrar"
        class="text-text-muted hover:text-text cursor-pointer">
        <app-icon name="x-mark" class="w-5 h-5" />
      </button>
    </div>
    <form [formGroup]="form" (ngSubmit)="save()" class="px-6 py-5">
      <label class="flex items-center gap-2.5 cursor-pointer">
        <input type="checkbox" formControlName="consentimientoFirmado"
          class="w-4 h-4 rounded border-border accent-primary cursor-pointer" />
        <span class="text-sm text-text">Consentimiento informado firmado</span>
      </label>
      @if (saveError()) {
        <p class="mt-3 text-xs text-danger" role="alert">{{ saveError() }}</p>
      }
      <div class="flex justify-end gap-3 mt-5 pt-4 border-t border-border">
        <button type="button" (click)="showModal.set(false)"
          class="px-4 py-2 text-sm text-text-muted hover:text-text transition-colors cursor-pointer">Cancelar</button>
        <button type="submit" [disabled]="saving()"
          class="px-5 py-2 text-sm font-medium bg-primary text-white rounded-md hover:bg-primary-dark disabled:opacity-50 cursor-pointer">
          {{ saving() ? 'Guardando…' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>
}
