<div class="bg-surface border border-border rounded-lg p-6">
  <div class="flex items-start justify-between mb-4">
    <h2 class="text-sm font-semibold text-text uppercase tracking-wider font-mono">Datos básicos</h2>
    <a
      [routerLink]="['/internal/modelos-animales', modeloAnimal().identificador, 'editar']"
      class="px-3 py-1.5 text-xs font-medium text-primary border border-primary/30 rounded-md
             hover:bg-primary/5 transition-colors"
    >
      Editar
    </a>
  </div>

  <dl class="grid grid-cols-2 sm:grid-cols-4 gap-x-6 gap-y-4 text-sm">
    <div>
      <dt class="text-xs font-mono text-text-muted uppercase tracking-wider mb-0.5">Camada</dt>
      <dd class="text-text font-mono">{{ modeloAnimal().camadaNombre }}</dd>
    </div>
    <div>
      <dt class="text-xs font-mono text-text-muted uppercase tracking-wider mb-0.5">Fecha nacimiento</dt>
      <dd class="text-text font-mono">{{ modeloAnimal().fechaNacimiento | fecha }}</dd>
    </div>
    <div>
      <dt class="text-xs font-mono text-text-muted uppercase tracking-wider mb-0.5">Día de vida</dt>
      <dd class="text-text font-mono font-semibold">Día {{ diaNacimiento() }}</dd>
    </div>
    <div>
      <dt class="text-xs font-mono text-text-muted uppercase tracking-wider mb-0.5">Sexo</dt>
      <dd>
        <app-status-badge [value]="modeloAnimal().sexo" [labels]="sexoLabels" [colorMap]="sexoColors" />
      </dd>
    </div>
  </dl>
</div>
