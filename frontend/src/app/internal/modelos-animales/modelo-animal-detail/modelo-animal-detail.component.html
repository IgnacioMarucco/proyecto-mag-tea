@if (loading()) {
  <div class="px-8 pb-8 flex items-center justify-center text-text-muted text-sm">Cargando…</div>
} @else if (loadError()) {
  <div class="px-8 pb-8">
    <p class="text-danger text-sm">{{ loadError() }}</p>
    <a routerLink="/internal/modelos-animales" class="mt-3 inline-block text-sm text-primary hover:underline">← Volver a modelos animales</a>
  </div>
} @else if (modeloAnimal(); as ma) {

<div class="px-8 pb-0">
  <div class="mb-6">
    <app-page-header [crumbs]="crumbs()">
      <app-copy-badge [value]="ma.identificador" />
      <app-status-badge
        [value]="ma.poolUso"
        [labels]="usoLabels"
        [colorMap]="usoColors"
      />
      <app-status-badge
        [value]="'' + ma.poolRango"
        [labels]="rangoLabels"
        [colorMap]="rangoColors"
      />
      <a
        [routerLink]="['/reporte/modelos-animales', ma.identificador]"
        target="_blank"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-surface border border-border text-text text-xs font-medium rounded-md hover:bg-background transition-colors"
      >
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Imprimir ficha
      </a>
    </app-page-header>
  </div>
</div>

<div class="px-8 pb-8 flex flex-col gap-4">

  <app-datos-basicos-ma-section [modeloAnimal]="ma" />

  <app-inoculacion-section [modeloAnimal]="ma" (updated)="onUpdated($event)" />

  @defer (on viewport) {
    <app-vocalizaciones-section [modeloAnimal]="ma" (updated)="onUpdated($event)" />
  } @placeholder {
    <div class="h-32 rounded-lg bg-surface border border-border animate-pulse"></div>
  }

  @defer (on viewport) {
    <app-tres-camaras-section [modeloAnimal]="ma" (updated)="onUpdated($event)" />
  } @placeholder {
    <div class="h-32 rounded-lg bg-surface border border-border animate-pulse"></div>
  }

  @defer (on viewport) {
    <app-microscopia-section [modeloAnimal]="ma" (updated)="onUpdated($event)" />
  } @placeholder {
    <div class="h-24 rounded-lg bg-surface border border-border animate-pulse"></div>
  }

</div>

}
