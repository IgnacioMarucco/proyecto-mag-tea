<div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <h3 class="text-sm font-semibold text-slate-700">Correlaciones entre Escalas</h3>

    <!-- Selector de ejes -->
    <div class="flex items-center gap-2">
      <label class="text-xs text-slate-500">Cruce:</label>
      <select
        class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
        [value]="parSeleccionado()"
        (change)="parSeleccionado.set(+$any($event.target).value)">
        @for (par of pares; track $index) {
          <option [value]="$index">{{ parLabel($index) }}</option>
        }
      </select>
    </div>
  </div>

  @if (isLoading()) {
    <div class="h-80 animate-pulse rounded bg-slate-50"></div>
  } @else if (hasError()) {
    <p class="text-sm text-slate-400">Error al cargar los datos</p>
  } @else if (isEmpty()) {
    <p class="text-sm text-slate-400">Sin pacientes con datos en ambas escalas seleccionadas</p>
  } @else {
    <div echarts [options]="chartOptions()!" [autoResize]="true" class="h-80 w-full"></div>

    <div class="mt-3 flex flex-wrap items-center justify-between gap-2">
      <p class="text-xs text-slate-400">
        Hover sobre un punto para ver el código del paciente.
      </p>
    </div>
  }
</div>
