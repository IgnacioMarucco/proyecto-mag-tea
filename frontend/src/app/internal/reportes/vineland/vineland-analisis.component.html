<div class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h3 class="mb-4 text-sm font-semibold text-slate-700">Vineland</h3>

  @if (data() === undefined) {
    <div class="h-24 animate-pulse rounded bg-slate-50"></div>
  } @else if (data() === null || data()!.totalConVineland === 0) {
    <p class="text-sm text-slate-400">Sin evaluaciones Vineland registradas</p>
  } @else {
    <p class="mb-3 text-xs text-slate-500">N = {{ data()!.totalConVineland }}</p>

    <div class="rounded-lg bg-indigo-50 px-4 py-3 text-center">
      <p class="text-xs text-indigo-500">Cociente Adaptativo</p>
      <p class="text-2xl font-bold text-indigo-700">
        {{ data()!.mediaCocienteFinal }}
        <span class="text-base font-normal text-indigo-400">± {{ data()!.sdCocienteFinal }}</span>
      </p>
    </div>
  }
</div>
