<div class="flex h-screen overflow-hidden bg-background font-sans">

  <!-- Sidebar -->
  <aside class="w-60 flex flex-col flex-shrink-0 bg-sidebar border-r border-sidebar-border">

    <!-- Brand -->
    <div class="px-5 py-5 border-b border-sidebar-border">
      <img src="/assets/logo-magtea.png" alt="MAG-TEA" class="h-7 w-auto mb-1" />
      <p class="text-sidebar-muted text-[10px] font-mono tracking-widest uppercase">
        Sistema de Investigación
      </p>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-2 overflow-y-auto" aria-label="Navegación principal">
      @for (section of visibleNavSections(); track section.label; let first = $first) {

        <!-- Separador entre secciones -->
        @if (!first) {
          <div class="mx-5 my-2 border-t border-sidebar-border"></div>
        }

        <!-- Label de sección -->
        <p class="px-5 pt-2 pb-1 text-[10px] font-mono text-sidebar-muted uppercase tracking-widest select-none">
          {{ section.label }}
        </p>

        <!-- Items de la sección -->
        @for (item of section.items; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="!text-white !border-l-2 !border-primary bg-primary/10"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex items-center pl-4 pr-5 py-2.5 text-sm text-sidebar-muted
                   border-l-2 border-transparent
                   hover:text-white hover:bg-white/5
                   transition-all duration-150"
            [attr.aria-label]="item.label"
          >
            {{ item.label }}
          </a>
        }

      }
    </nav>

    <!-- User -->
    <div class="px-5 py-4 border-t border-sidebar-border">
      <p class="text-white text-sm font-medium truncate" [title]="user()?.email ?? ''">
        {{ user()?.email }}
      </p>
      <p class="text-accent text-[11px] font-mono mt-0.5">{{ roleLabel() }}</p>
      <button
        (click)="logout()"
        class="mt-3 text-xs text-sidebar-muted hover:text-white transition-colors"
        aria-label="Cerrar sesión"
      >
        Cerrar sesión →
      </button>
    </div>

  </aside>

  <!-- Content -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet />
  </main>

</div>
