<section aria-labelledby="page-title">
  <header class="page-header">
    <h1 id="page-title">Profesionales</h1>
    <a routerLink="/internal/profesionales/nuevo" class="btn-primary">Nuevo profesional</a>
  </header>

  @if (profesionales().length === 0) {
    <p>No hay profesionales registrados.</p>
  } @else {
    <table aria-label="Listado de profesionales">
      <thead>
        <tr>
          <th scope="col">Nombre</th>
          <th scope="col">Email</th>
          <th scope="col">Rol</th>
          <th scope="col">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (p of profesionales(); track p.id) {
          <tr>
            <td>{{ p.apellido }}, {{ p.nombre }}</td>
            <td>{{ p.email }}</td>
            <td>{{ roleLabels[p.role] }}</td>
            <td>
              <a [routerLink]="['/internal/profesionales', p.id, 'editar']">Editar</a>
              <button
                (click)="confirmDelete(p.id)"
                [disabled]="deleting() === p.id"
                [attr.aria-label]="'Dar de baja a ' + p.nombre + ' ' + p.apellido"
              >
                {{ deleting() === p.id ? 'Procesando...' : 'Dar de baja' }}
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</section>
