<div class="px-8 pb-8">

  <div class="flex items-center justify-between mb-6">
    <app-page-header [crumbs]="crumbs()" />
    <a routerLink="/internal/profesionales/nuevo"
      class="inline-flex items-center gap-1.5 px-4 py-2 bg-primary text-white text-sm font-medium rounded-md hover:bg-primary-dark transition-colors whitespace-nowrap">
      <app-icon name="plus" class="w-4 h-4" /> Registrar profesional
    </a>
  </div>

  <app-list-toolbar
    placeholder="Buscar por nombre o email…"
    [filterGroups]="filterGroups"
    [activeFilters]="activeFilters()"
    (searchChange)="onSearch($event)"
    (filtersChange)="onFiltersChange($event)"
  />

  <span aria-live="polite" class="sr-only">
    {{ totalElements() }} {{ totalElements() === 1 ? 'profesional encontrado' : 'profesionales encontrados' }}
  </span>

  <app-data-table
    [columns]="columns"
    [rows]="profesionales().length"
    ariaLabel="Listado de profesionales"
    [emptyTitle]="emptyTitle()"
    [emptySubtitle]="emptySubtitle()"
    [currentSort]="sortState()"
    (sortChange)="onSortChange($event)"
  >
    @for (p of profesionales(); track p.id) {
      <tr class="border-b border-border last:border-0 hover:bg-background transition-colors">
        <td class="px-5 py-3.5 text-text font-medium">{{ p.apellido }}, {{ p.nombre }}</td>
        <td class="px-5 py-3.5 text-text-muted font-mono text-xs">{{ p.email }}</td>
        <td class="px-5 py-3.5 text-text-muted">{{ p.telefono ?? '—' }}</td>
        <td class="px-5 py-3.5">
          <app-status-badge [value]="p.role" [labels]="roleLabels" [colorMap]="rolColors" />
        </td>
        <td class="px-5 py-3.5">
          <app-row-actions [actions]="getActionsFor(p)" />
        </td>
      </tr>
    }
  </app-data-table>

  <app-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalElements]="totalElements()"
    itemLabel="profesionales"
    (pageChange)="goToPage($event)"
  />

</div>

@if (pendingDeleteId() !== null) {
  <app-confirm-modal
    title="¿Dar de baja al profesional?"
    message="El profesional quedará inactivo y no podrá iniciar sesión."
    confirmLabel="Dar de baja"
    cancelLabel="Cancelar"
    (confirmed)="confirmDelete()"
    (cancelled)="cancelDelete()"
  />
}
