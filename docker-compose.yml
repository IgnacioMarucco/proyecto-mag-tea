services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_INIT_ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_INIT_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_INIT_SEED_INVESTIGADOR_EMAIL: ${SEED_INVESTIGADOR_EMAIL}
      APP_INIT_SEED_INVESTIGADOR_PASSWORD: ${SEED_INVESTIGADOR_PASSWORD}
      APP_INIT_SEED_SECRETARIA_EMAIL: ${SEED_SECRETARIA_EMAIL}
      APP_INIT_SEED_SECRETARIA_PASSWORD: ${SEED_SECRETARIA_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4200}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_BACK_URL_BASE: ${MP_BACK_URL_BASE:-http://localhost:4200}
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://app.localhost:4200}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
