services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend-net

  db:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: magtea
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d magtea"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_INIT_ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_INIT_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_INIT_SEED_INVESTIGADOR_EMAIL: ${SEED_INVESTIGADOR_EMAIL}
      APP_INIT_SEED_INVESTIGADOR_PASSWORD: ${SEED_INVESTIGADOR_PASSWORD}
      APP_INIT_SEED_MEDICO_EMAIL: ${SEED_MEDICO_EMAIL}
      APP_INIT_SEED_MEDICO_PASSWORD: ${SEED_MEDICO_PASSWORD}
      APP_INIT_SEED_TECNICO_EMAIL: ${SEED_TECNICO_EMAIL}
      APP_INIT_SEED_TECNICO_PASSWORD: ${SEED_TECNICO_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:4200}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_BACK_URL_BASE: ${MP_BACK_URL_BASE:-http://localhost:4200}
      MP_NOTIFICATION_URL: ${MP_NOTIFICATION_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://app.localhost:4200}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - frontend-net
      - backend-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - backend
    networks:
      - frontend-net

volumes:
  postgres_data:
  minio_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
