services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2   # cache de dependencias entre reinicios
    environment:
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules       # evita que el host sobreescriba node_modules del contenedor
    ports:
      - "4200:4200"

volumes:
  maven_cache:
